name: fin_goal
description: Financial Scenario Simulator — Mô phỏng tài chính dựa trên dữ liệu bạn cung cấp.
publish_to: 'none'

version: 0.1.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'
  flutter: '>=3.19.0'

dependencies:
  flutter:
    sdk: flutter

  # ── State Management ──────────────────────────────────────────────────────
  flutter_riverpod: ^3.3.1
  riverpod_annotation: ^4.0.2

  # ── Navigation ────────────────────────────────────────────────────────────
  go_router: ^17.3.0

  # ── Dependency Injection ──────────────────────────────────────────────────
  get_it: ^9.2.1
  injectable: ^3.0.0

  # ── Backend (Supabase) ────────────────────────────────────────────────────
  supabase_flutter: ^2.5.0

  # ── Local Storage ─────────────────────────────────────────────────────────
  shared_preferences: ^2.3.0     # Simple KV store for settings/cache

  # ── Payments (RevenueCat) ─────────────────────────────────────────────────
  purchases_flutter: ^10.2.0

  # ── Push Notifications ────────────────────────────────────────────────────
  firebase_core: ^4.10.0
  firebase_messaging: ^16.3.0

  # ── Analytics & Error Tracking ────────────────────────────────────────────
  posthog_flutter: ^5.25.2
  sentry_flutter: ^9.0.0
  flutter_dotenv: ^5.1.0

  # ── UI / Animations ───────────────────────────────────────────────────────
  google_fonts: ^8.1.0
  lottie: ^3.1.0
  flutter_svg: ^2.0.10
  screenshot: ^3.0.0
  flutter_animate: ^4.5.0
  gap: ^3.0.1

  # ── Utils ─────────────────────────────────────────────────────────────────
  freezed_annotation: ^3.1.0
  json_annotation: ^4.9.0
  intl: ^0.20.2
  equatable: ^2.0.5
  dartz: ^0.10.1
  package_info_plus: ^10.1.0
  url_launcher: ^6.3.0
  path_provider: ^2.1.5
  audioplayers: ^6.7.0
  confetti: ^0.8.0
  share_plus: ^13.1.0
  # google_mobile_ads: ^8.0.0
  flutter_native_splash: ^2.4.0


dev_dependencies:
  flutter_test:
    sdk: flutter

  # ── Code Generation ───────────────────────────────────────────────────────
  build_runner: ^2.4.11
  riverpod_generator: ^4.0.4-dev.1
  injectable_generator: ^3.0.2
  freezed: ^3.2.6-dev.1
  json_serializable: ^6.8.0

  # ── Testing ───────────────────────────────────────────────────────────────
  mocktail: ^1.0.4

  # ── Linting ───────────────────────────────────────────────────────────────
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/images/goals/
    - assets/animations/
    - assets/audio/

  # fonts: uncomment and add files to assets/fonts/ before enabling
  # fonts:
  #   - family: Inter
  #     fonts:
  #       - asset: assets/fonts/Inter-Regular.ttf
  #       - asset: assets/fonts/Inter-Bold.ttf
  #         weight: 700

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/logo.png"
  adaptive_icon_background: "#121212"
  adaptive_icon_foreground: "assets/images/logo.png"

flutter_native_splash:
  color: "#121212"
  image: "assets/images/plash.png"
  android_12:
    image: "assets/images/plash.png"
    icon_background_color: "#121212"
